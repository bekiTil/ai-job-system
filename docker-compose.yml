version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: ai_jobs_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: ai_jobs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", pg_isready -U admin -d ai_jobs]
      interval: 5s
      timeout: 3s
      retries: 5
  redis:
    image: redis:7
    container_name: ai_jobs_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  
  api:
    build:
     context: .
     dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/ai_jobs
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}

  worker:
      build:
        context: .
        dockerfile: Dockerfile.worker
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      environment:
        DATABASE_URL: postgresql://admin:admin123@postgres:5432/ai_jobs
        REDIS_URL: redis://redis:6379
        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  pgdata: